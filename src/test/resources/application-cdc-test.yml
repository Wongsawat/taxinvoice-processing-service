server:
  port: 0

spring:
  application:
    name: taxinvoice-processing-service-cdc-test

  datasource:
    url: jdbc:postgresql://localhost:5433/taxinvoiceprocess_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

camel:
  springboot:
    main-run-controller: false

eureka:
  client:
    enabled: false

app:
  kafka:
    bootstrap-servers: localhost:9093
    topics:
      document-received-taxinvoice: document.received.tax-invoice
      taxinvoice-processed: taxinvoice.processed
      xml-signing-requested: xml.signing.requested
      dlq: taxinvoice.processing.dlq

logging:
  level:
    root: WARN
    com.wpanther.taxinvoice.processing: DEBUG
