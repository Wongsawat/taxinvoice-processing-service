spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

# Apache Camel test configuration
camel:
  springboot:
    name: taxinvoice-processing-camel-test
  dataformat:
    jackson:
      auto-discover-object-mapper: true

# Application-specific configuration (test topics)
app:
  kafka:
    bootstrap-servers: localhost:9093
    topics:
      taxinvoice-processed: taxinvoice.processed.test
      dlq: taxinvoice.processing.dlq.test
      saga-command-tax-invoice: saga.command.tax-invoice.test
      saga-compensation-tax-invoice: saga.compensation.tax-invoice.test
      saga-reply-tax-invoice: saga.reply.tax-invoice.test

logging:
  level:
    root: WARN
    com.wpanther.taxinvoice.processing: INFO
    org.apache.camel: WARN
