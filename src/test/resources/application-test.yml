spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

# Apache Camel test configuration
camel:
  springboot:
    name: taxinvoice-processing-camel-test

# Application-specific configuration (test topics)
app:
  kafka:
    bootstrap-servers: localhost:9093
    topics:
      document-received-taxinvoice: document.received.tax-invoice.test
      taxinvoice-processed: taxinvoice.processed.test
      xml-signing-requested: xml.signing.requested.test
      dlq: taxinvoice.processing.dlq.test

logging:
  level:
    root: WARN
    com.wpanther.taxinvoice.processing: INFO
    org.apache.camel: WARN
